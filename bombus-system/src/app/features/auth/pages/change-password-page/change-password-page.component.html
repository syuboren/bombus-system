<div class="login-page">
  <!-- Background -->
  <div class="login-bg">
    <div class="bg-shape bg-shape--1"></div>
    <div class="bg-shape bg-shape--2"></div>
    <div class="bg-shape bg-shape--3"></div>
    <div class="bg-pattern"></div>
  </div>

  <!-- Card -->
  <div class="login-card">
    <div class="login-header">
      <div class="logo">
        <div class="logo__icon">
          <img class="logo__svg" src="assets/images/bombus-logo.svg" alt="Bombus Logo">
        </div>
        <div class="logo__text">
          <span class="logo__name">Bombus</span>
          <span class="logo__tagline">HR Management System</span>
        </div>
      </div>
      <h1 class="login-title">變更密碼</h1>
      <p class="login-subtitle">請設定您的新密碼</p>
    </div>

    <!-- 首次登入提示 -->
    @if (user()?.must_change_password) {
    <div class="force-change-notice">
      <i class="ri-information-line"></i>
      <span>首次登入請變更密碼後繼續使用系統</span>
    </div>
    }

    <!-- Error -->
    @if (errorMessage()) {
    <div class="alert alert--error alert--sm">
      <i class="ri-error-warning-line"></i>
      <span>{{ errorMessage() }}</span>
    </div>
    }

    <form class="login-form" (ngSubmit)="onSubmit()">
      <!-- 目前密碼 -->
      <div class="form-group">
        <label class="form-label" for="currentPassword">
          <i class="ri-lock-line"></i> 目前密碼
        </label>
        <div class="input-wrapper input-wrapper--password">
          <input
            id="currentPassword"
            class="form-input"
            [type]="showCurrentPassword() ? 'text' : 'password'"
            placeholder="請輸入目前密碼"
            [ngModel]="currentPassword()"
            (ngModelChange)="currentPassword.set($event)"
            [ngModelOptions]="{standalone: true}"
            autocomplete="current-password"
          >
          <button type="button" class="password-toggle" (click)="showCurrentPassword.set(!showCurrentPassword())">
            <i [class]="showCurrentPassword() ? 'ri-eye-off-line' : 'ri-eye-line'"></i>
          </button>
        </div>
      </div>

      <!-- 新密碼 -->
      <div class="form-group">
        <label class="form-label" for="newPassword">
          <i class="ri-lock-password-line"></i> 新密碼
        </label>
        <div class="input-wrapper input-wrapper--password">
          <input
            id="newPassword"
            class="form-input"
            [type]="showNewPassword() ? 'text' : 'password'"
            placeholder="至少 8 個字元"
            [ngModel]="newPassword()"
            (ngModelChange)="newPassword.set($event)"
            [ngModelOptions]="{standalone: true}"
            autocomplete="new-password"
          >
          <button type="button" class="password-toggle" (click)="showNewPassword.set(!showNewPassword())">
            <i [class]="showNewPassword() ? 'ri-eye-off-line' : 'ri-eye-line'"></i>
          </button>
        </div>
        @if (newPassword().length > 0 && newPassword().length < 8) {
        <span class="field-hint field-hint--error">密碼至少需要 8 個字元</span>
        }
      </div>

      <!-- 確認密碼 -->
      <div class="form-group">
        <label class="form-label" for="confirmPassword">
          <i class="ri-lock-password-line"></i> 確認新密碼
        </label>
        <div class="input-wrapper input-wrapper--password">
          <input
            id="confirmPassword"
            class="form-input"
            type="password"
            placeholder="再次輸入新密碼"
            [ngModel]="confirmPassword()"
            (ngModelChange)="confirmPassword.set($event)"
            [ngModelOptions]="{standalone: true}"
            autocomplete="new-password"
          >
        </div>
        @if (confirmPassword().length > 0 && !passwordsMatch()) {
        <span class="field-hint field-hint--error">密碼不一致</span>
        }
      </div>

      <!-- Submit -->
      <button
        type="submit"
        class="btn-login"
        [disabled]="!canSubmit()"
      >
        @if (isLoading()) {
        <span class="btn-spinner"></span>
        <span>處理中...</span>
        } @else {
        <i class="ri-shield-check-line"></i>
        <span>變更密碼</span>
        }
      </button>
    </form>
  </div>
</div>
