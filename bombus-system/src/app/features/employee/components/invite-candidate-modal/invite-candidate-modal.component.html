@if (isVisible()) {
<div class="modal-backdrop" (click)="close.emit()"></div>
<div class="modal">
    <div class="modal-header">
        <h3 class="modal-title">
            <i class="ri-mail-send-line"></i>
            發送面試邀約
        </h3>
        <button class="btn-close" (click)="close.emit()" type="button">
            <i class="ri-close-line"></i>
        </button>
    </div>

    <div class="modal-body">
        <div class="candidate-preview">
            <h4>{{ candidate().name }}</h4>
            <span class="position-badge">{{ candidate().position }}</span>
        </div>

        <!-- Reschedule Note Alert -->
        @if (candidate().rescheduleNote) {
        <div class="reschedule-alert">
            <i class="ri-calendar-todo-line"></i>
            <div class="alert-content">
                <strong>候選人改期需求</strong>
                <p>{{ candidate().rescheduleNote }}</p>
            </div>
        </div>
        }

        <div class="form-group">
            <label class="form-label">邀約訊息</label>
            <textarea class="form-textarea" rows="4" [value]="message()"
                (input)="message.set($any($event.target).value)"></textarea>
        </div>

        <div class="form-group">
            <label class="form-label">建議面試時段 (候選人將從中選擇)</label>
            @for (slot of proposedSlots(); track $index) {
            <div class="slot-row">
                <input type="datetime-local" class="form-input" [value]="slot"
                    (input)="updateSlot($index, $any($event.target).value)">
                <button class="btn-icon-danger" (click)="removeSlot($index)" *ngIf="proposedSlots().length > 1">
                    <i class="ri-delete-bin-line"></i>
                </button>
            </div>
            }
            <button class="btn-add-slot" (click)="addSlot()">
                <i class="ri-add-line"></i> 新增時段
            </button>
        </div>
    </div>

    <div class="modal-footer">
        <button class="btn btn-secondary" (click)="close.emit()" type="button" [disabled]="loading()">取消</button>
        <button class="btn btn-primary" (click)="submit()" type="button" [disabled]="loading()">
            <i class="ri-send-plane-line"></i>
            {{ loading() ? '發送中...' : '確認發送' }}
        </button>
    </div>
</div>
}
