<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>模板定義器 - HR 管理員</title>
    <link rel="stylesheet" href="css/common.css">
    <link rel="stylesheet" href="css/designer.css">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script>
        // 設定 PDF.js worker
        if (typeof pdfjsLib !== 'undefined') {
            pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
        }
    </script>
</head>
<body>
    <div class="designer-container">
        <!-- 頂部導航列 -->
        <div class="designer-header">
            <div class="header-left">
                <button id="btn-back" class="btn btn-secondary">← 返回</button>
                <span class="header-title" id="template-name">新模板</span>
            </div>
            <div class="header-right">
                <button id="btn-save" class="btn btn-success">儲存模板</button>
            </div>
        </div>

        <!-- 主要工作區 -->
        <div class="designer-main">
            <!-- 左側工具欄 - 欄位庫 -->
            <div class="designer-sidebar-left">
                <h3 class="field-library-title">欄位庫</h3>
                
                <div class="field-category">
                    <div class="category-title">標準資訊</div>
                    <div class="field-item" data-type="text" data-key="user_name" data-label="員工姓名">
                        <span class="field-item-icon">👤</span>
                        <span class="field-item-label">員工姓名</span>
                    </div>
                    <div class="field-item" data-type="text" data-key="user_id" data-label="身分證字號">
                        <span class="field-item-icon">🆔</span>
                        <span class="field-item-label">身分證字號</span>
                    </div>
                    <div class="field-item" data-type="text" data-key="user_phone" data-label="手機號碼">
                        <span class="field-item-icon">📱</span>
                        <span class="field-item-label">手機號碼</span>
                    </div>
                    <div class="field-item" data-type="text" data-key="user_email" data-label="電子信箱">
                        <span class="field-item-icon">✉️</span>
                        <span class="field-item-label">電子信箱</span>
                    </div>
                    <div class="field-item" data-type="text" data-key="user_address" data-label="地址">
                        <span class="field-item-icon">📍</span>
                        <span class="field-item-label">地址</span>
                    </div>
                </div>

                <div class="field-category">
                    <div class="category-title">合約變數</div>
                    <div class="field-item" data-type="date" data-key="start_date" data-label="到職日期">
                        <span class="field-item-icon">📅</span>
                        <span class="field-item-label">到職日期</span>
                    </div>
                    <div class="field-item" data-type="text" data-key="position" data-label="職位">
                        <span class="field-item-icon">💼</span>
                        <span class="field-item-label">職位</span>
                    </div>
                    <div class="field-item" data-type="text" data-key="department" data-label="部門">
                        <span class="field-item-icon">🏢</span>
                        <span class="field-item-label">部門</span>
                    </div>
                </div>

                <div class="field-category">
                    <div class="category-title">簽署元件</div>
                    <div class="field-item" data-type="signature" data-key="signature_main" data-label="員工簽名">
                        <span class="field-item-icon">✍️</span>
                        <span class="field-item-label">員工簽名</span>
                    </div>
                    <div class="field-item" data-type="date" data-key="sign_date" data-label="簽署日期">
                        <span class="field-item-icon">📆</span>
                        <span class="field-item-label">簽署日期</span>
                    </div>
                </div>
            </div>

            <!-- 中間工作區 - 畫布 -->
            <div class="designer-canvas-area">
                <div class="canvas-wrapper">
                    <div class="canvas-background">
                        <div class="canvas-placeholder">
                            <div class="upload-area">
                                <div class="upload-icon">📄</div>
                                <div style="font-size: 18px; margin-bottom: 10px; font-weight: 600;">上傳 PDF 模板</div>
                                <div style="font-size: 14px; color: #666;">點擊此處或拖放 PDF 檔案</div>
                                <input type="file" id="pdf-upload-input" accept=".pdf" style="display: none;">
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 右側屬性欄 -->
            <div class="designer-sidebar-right">
                <h3 class="properties-title">欄位屬性</h3>
                <div id="properties-empty" class="properties-empty">
                    請選擇畫布上的欄位以編輯屬性
                </div>
                <div class="properties-panel" style="display: none;">
                    <div class="property-group">
                        <label class="property-label">變數名稱 (Key)</label>
                        <input type="text" id="property-key" class="property-input" readonly>
                    </div>
                    <div class="property-group">
                        <label class="property-label">顯示名稱 (Label)</label>
                        <input type="text" id="property-label" class="property-input">
                    </div>
                    <div class="property-group">
                        <label class="property-label">字體大小</label>
                        <input type="number" id="property-font-size" class="property-input" min="8" max="72">
                    </div>
                    <div class="property-group">
                        <div class="property-checkbox">
                            <input type="checkbox" id="property-required">
                            <label for="property-required" class="property-label">必填欄位</label>
                        </div>
                    </div>
                    <div class="property-actions">
                        <button class="btn btn-danger" id="btn-delete-field">刪除欄位</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="js/storage.js"></script>
    <script src="js/designer.js"></script>
</body>
</html>
