<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SaaS 員工入職電子簽署系統</title>
    <link rel="stylesheet" href="css/common.css">
    <style>
        .home-container {
            max-width: 800px;
            margin: 100px auto;
            text-align: center;
        }

        .home-title {
            font-size: 32px;
            color: #333;
            margin-bottom: 10px;
        }

        .home-subtitle {
            font-size: 18px;
            color: #666;
            margin-bottom: 50px;
        }

        .role-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            margin-top: 40px;
        }

        .role-card {
            background: white;
            border-radius: 12px;
            padding: 40px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s, box-shadow 0.3s;
            cursor: pointer;
            text-decoration: none;
            color: inherit;
            display: block;
        }

        .role-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 12px rgba(0, 0, 0, 0.15);
        }

        .role-icon {
            font-size: 48px;
            margin-bottom: 20px;
        }

        .role-title {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 15px;
            color: #007bff;
        }

        .role-description {
            font-size: 14px;
            color: #666;
            line-height: 1.8;
        }

        .hr-card {
            border-top: 4px solid #007bff;
        }

        .employee-card {
            border-top: 4px solid #28a745;
        }
    </style>
</head>
<body>
    <div class="home-container">
        <h1 class="home-title">SaaS 員工入職電子簽署系統</h1>
        <p class="home-subtitle">No-Code 員工入職與電子簽署 SaaS 平台</p>
        
        <div class="role-cards">
            <a href="hr-designer.html" class="role-card hr-card">
                <div class="role-icon">👔</div>
                <div class="role-title">HR 管理員</div>
                <div class="role-description">
                    建立與管理入職合約模板<br>
                    定義欄位映射與簽署區域<br>
                    發布模板給新進員工使用
                </div>
            </a>
            
            <a href="employee-wizard.html" class="role-card employee-card">
                <div class="role-icon">👤</div>
                <div class="role-title">新進員工</div>
                <div class="role-description">
                    填寫個人資料與合約資訊<br>
                    在線上簽署入職文件<br>
                    完成入職流程
                </div>
            </a>
        </div>
    </div>
</body>
</html>
